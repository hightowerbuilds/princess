  <text x="340" y="168" font-family="Arial, sans-serif" font-size="15" fill="#222222">landing-page-build-brief [html]</text>
  <rect x="326" y="202" width="250" height="46" fill="#ffffff" stroke="#999999"/>
  <text x="340" y="230" font-family="Arial, sans-serif" font-size="15" fill="#222222">release-notes-drafting</text>
